<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
    />
    <!-- Pre-boot defaults for Kimbie Dark (the default theme); pocket-theme.ts
         re-syncs both to the applied theme at runtime, before first paint. -->
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#362712" />
    <title>Dormouse Pocket</title>
    <style>
      /* Theme-agnostic viewport plumbing. Colors and fonts come from the shared
         theme system applied to <body> (src/theme.css + main.tsx's
         restorePocketTheme()); the dark fallback only shows in the sub-frame
         window before the theme applies on first paint. */
      html,
      body {
        height: 100%;
        -webkit-text-size-adjust: 100%;
        overscroll-behavior: none;
        background: var(--color-app-bg, #362712);
        color: var(--color-app-fg, #d3af86);
      }
      #pocket-root {
        height: 100dvh;
        display: flex;
        flex-direction: column;
      }
    </style>
  </head>
  <body>
    <div id="pocket-root"></div>
    <script type="module" src="../src/remote/pocket-app/main.tsx"></script>
  </body>
</html>
